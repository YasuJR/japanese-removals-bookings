services:
  - type: web
    name: japanese-removals-bookings
    runtime: python
    plan: starter
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PRODUCTION
        value: "true"
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: japanese-removals-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false
      - key: PRODUCTION_DOMAIN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: STAFF_USERNAME
        sync: false
      - key: STAFF_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_JSON
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_CALENDAR_ENABLED
        value: "true"
      - key: GMAIL_INBOX_ENABLED
        value: "true"
      - key: XERO_CLIENT_ID
        sync: false
      - key: XERO_CLIENT_SECRET
        sync: false
      - key: XERO_TENANT_ID
        sync: false
      - key: XERO_TOKEN_JSON
        sync: false
      - key: XERO_REDIRECT_URI
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_ENABLED
        value: "true"

databases:
  - name: japanese-removals-db
    plan: basic-256mb
    region: singapore
    ipAllowList: []
